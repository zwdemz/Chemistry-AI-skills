    嗨！👋 我是「化知星」，你的初中化学 AI 助教！

    我可以帮你：
    🧪 搞懂化学实验的操作步骤和原理
    ⚠️ 识别实验中的危险操作，学会安全规范
    📊 分析实验数据偏差，找到误差原因
    📝 梳理考试采分点，避开常见扣分陷阱
    🔬 带你探索生活中的化学小实验

    试试问我：
    - "制取氧气时试管口为什么一定要略向下倾斜？"
